# ============================================================================
# SIKAP - Sistem Informasi Kepatuhan Ibadah Peserta Didik
# Docker Compose - Development Environment
# ============================================================================
# Quick Start:
#   1. Copy .env.example ke .env dan sesuaikan jika perlu
#   2. Jalankan: docker compose up -d --build
#   3. Tunggu ~30 detik sampai semua service healthy
#   4. Buka browser:
#      - Frontend  : http://localhost:8081
#      - Backend   : http://localhost:5000
#      - Grafana   : http://localhost:3000  (admin/admin)
#      - Kibana    : http://localhost:5601
#      - MQTT WS   : ws://localhost:9001
#
# Hentikan semua: docker compose down
# Reset database : docker compose down -v  (hapus semua data!)
# ============================================================================
name: sikap

services:

  # --------------------------------------------------------------------------
  # DATABASE - MySQL 8
  # --------------------------------------------------------------------------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-sikap_root_2025}
      MYSQL_DATABASE: ${DB_NAME:-sikap_db}
      MYSQL_USER: ${DB_USER:-sikap_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sikap_pass_2025}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-sikap_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # PHPMYADMIN - Database Management UI (opsional)
  # --------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-sikap_user}
      PMA_PASSWORD: ${DB_PASSWORD:-sikap_pass_2025}
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - devtools
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # BACKEND - Flask API (Waitress WSGI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DEBUG_METRICS: ${DEBUG_METRICS:-1}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      JWT_ACTIVE_KID: ${JWT_ACTIVE_KID:-v1}
      JWT_LEGACY_KID: ${JWT_LEGACY_KID:-v1}
      JWT_ADDITIONAL_SECRET_KEYS: ${JWT_ADDITIONAL_SECRET_KEYS:-}
      JWT_ACCESS_TOKEN_HOURS: ${JWT_ACCESS_TOKEN_HOURS:-12}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,http://localhost:5173,http://127.0.0.1:5173}
      RFID_REQUIRE_SIGNATURE: ${RFID_REQUIRE_SIGNATURE:-0}
      RFID_SIGNATURE_TOLERANCE_SECONDS: ${RFID_SIGNATURE_TOLERANCE_SECONDS:-120}
      RFID_PUBLIC_KEY_DIR: ${RFID_PUBLIC_KEY_DIR:-/app/keys/rfid_public}
      DATABASE_URL: mysql+pymysql://${DB_USER:-sikap_user}:${DB_PASSWORD:-sikap_pass_2025}@db:3306/${DB_NAME:-sikap_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-ganti-di-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-key-ganti-di-production}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
      - "5001:5000"  # Alternatif untuk perangkat ESP8266 jika port 5000 host dipakai Windows portproxy
    volumes:
      - ./backend:/app
      - backend_static:/app/app/static/generated
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
      elasticsearch:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # FRONTEND - React/Vite (dev server dengan hot reload)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
      VITE_API_PROXY_TARGET: http://backend:5000
      VITE_BACKEND_PUBLIC_URL: http://localhost:5000
      VITE_GRAFANA_URL: http://localhost:3000
      VITE_PROMETHEUS_URL: http://localhost:9090
      VITE_MQTT_WS_URL: ws://localhost:9001
    ports:
      - "8081:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 25s
    depends_on:
      - backend
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # MQTT BROKER - Mosquitto (notifikasi real-time)
  # --------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT standard
      - "9001:9001"     # MQTT over WebSocket (untuk frontend)
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # ELASTICSEARCH - Pencarian & analitik cepat
  # --------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # KIBANA - Dashboard Elasticsearch (opsional, untuk debugging)
  # --------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - monitoring
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # REDIS - Cache & message queue
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # PROMETHEUS - Metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # GRAFANA - Monitoring dashboard
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sikap-net

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  mysql_data:
    driver: local
  es_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_static:
    driver: local

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  sikap-net:
    driver: bridge
