# ============================================================================
# SIKAP - Sistem Informasi Kepatuhan Ibadah Peserta Didik
# Docker Compose - Development Environment
# ============================================================================
# Quick Start:
#   1. Copy .env.example ke .env dan sesuaikan jika perlu
#   2. Jalankan: docker compose up -d --build
#   3. Tunggu ~30 detik sampai semua service healthy
#   4. Buka browser:
#      - Frontend  : http://localhost:5173
#      - Backend   : http://localhost:5000
#      - Grafana   : http://localhost:3000  (admin/admin)
#      - Kibana    : http://localhost:5601
#      - MQTT WS   : ws://localhost:9001
#
# Hentikan semua: docker compose down
# Reset database : docker compose down -v  (hapus semua data!)
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # DATABASE - MySQL 8
  # --------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: sikap-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-sikap_root_2025}
      MYSQL_DATABASE: ${DB_NAME:-sikap_db}
      MYSQL_USER: ${DB_USER:-sikap_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sikap_pass_2025}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-sikap_root_2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # PHPMYADMIN - Database Management UI (opsional)
  # --------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: sikap-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-sikap_user}
      PMA_PASSWORD: ${DB_PASSWORD:-sikap_pass_2025}
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - devtools
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # BACKEND - Flask API (Waitress WSGI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sikap-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DATABASE_URL: mysql+pymysql://${DB_USER:-sikap_user}:${DB_PASSWORD:-sikap_pass_2025}@db:3306/${DB_NAME:-sikap_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-ganti-di-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-key-ganti-di-production}
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      ELASTICSEARCH_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_static:/app/app/static/generated
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # FRONTEND - React/Vite (dev server dengan hot reload)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sikap-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
      VITE_MQTT_WS_URL: ws://localhost:9001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # MQTT BROKER - Mosquitto (notifikasi real-time)
  # --------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sikap-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT standard
      - "9001:9001"     # MQTT over WebSocket (untuk frontend)
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # ELASTICSEARCH - Pencarian & analitik cepat
  # --------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sikap-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # KIBANA - Dashboard Elasticsearch (opsional, untuk debugging)
  # --------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: sikap-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - monitoring
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # REDIS - Cache & message queue
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sikap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # PROMETHEUS - Metrics collection
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sikap-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    profiles:
      - monitoring
    networks:
      - sikap-net

  # --------------------------------------------------------------------------
  # GRAFANA - Monitoring dashboard
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: sikap-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring
    networks:
      - sikap-net

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  mysql_data:
    driver: local
  es_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_log:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_static:
    driver: local

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  sikap-net:
    driver: bridge
