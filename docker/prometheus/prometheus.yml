# Prometheus Configuration - SIKAP Development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sikap-backend"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:5000"]
        labels:
          app: "sikap"
          component: "backend"
