# Prometheus Configuration - SIKAP Development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sikap-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:5000"]
        labels:
          app: "sikap"
          component: "backend"

  - job_name: "elasticsearch"
    metrics_path: /_prometheus/metrics
    static_configs:
      - targets: ["elasticsearch:9200"]
        labels:
          app: "sikap"
          component: "elasticsearch"
